[tool.mypy]
python_version = "3.12"
strict = false
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
    "tests/",
]

[[tool.mypy.overrides]]
module = ["engine.tests.*", "engine.tests.conftest"]
disallow_untyped_defs = false
check_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "engine.agent.repositories.*",
    "engine.api.*",
    "engine.environment.*",
    "engine.memory.*",
    "engine.semantic.*",
    "engine.sql.*",
    "engine.tools.*",
    "engine.evaluation.*",
    "engine.ai_enrich",
]
ignore_errors = true

[[tool.mypy.overrides]]
module = [
    "engine.agent.*",
    "engine.api.agent",
    "engine.api.datasources",
    "engine.api.table_design",
    "engine.sql.dialect_context",
    "engine.sql.executor",
    "engine.sql.execution.*",
    "engine.sql.permissions.*",
    "engine.sql.result_view.*",
    "engine.sql.safety.*",
    "engine.sql.safety_gate",
    "engine.sql.sql_backed_view",
    "engine.test_data",
]
ignore_errors = false



[tool.pytest.ini_options]
markers = [
    "e2e: end-to-end tests that require a real DBFox runtime and external services",
    "integration: tests that require external services (real API calls, etc.)",
    "slow: tests that take longer to run",
    "real_llm: tests that require real LLM API access (API key, etc.)",
]

