name: workspace.explain_schema
group: workspace
kind: code
description: >
  Explain schema information already present in the CURRENT WORKSPACE CONTEXT,
  such as a selected schema artifact or prior schema-linking result. Do NOT use
  this tool to look up a table from the live datasource — use
  schema.describe_table instead.
handler: workspace_assist
input_schema:
  type: object
  description: Optional question override.
  properties:
    question:
      type: string
binding:
  produces_state_keys: [answer, final_answer, status]
metadata:
  next_route: answer
