name: workspace.explain_result
group: workspace
kind: code
description: >
  Explain the result set currently visible in the editor. Uses the last query
  result preview. Does NOT execute new SQL.
handler: workspace_assist
input_schema:
  type: object
  description: Optional question override.
  properties:
    question:
      type: string
binding:
  produces_state_keys: [answer, final_answer, status]
metadata:
  next_route: answer
