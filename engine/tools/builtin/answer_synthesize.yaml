name: answer.synthesize
group: answer
kind: code
description: >
  Synthesize a structured analysis answer from the query result, result profile,
  chart suggestion, and safety report. Produces an AgentAnswer with: answer text,
  key findings, evidence references, caveats, recommendations, and follow-up
  questions. Call this as the final analysis step after result.profile and
  optionally chart.suggest. For simple lookups you may call this to produce a
  concise interpreted answer instead of raw rows.
handler: answer_synthesize_handler
input_schema:
  type: object
  description: Synthesize a structured answer from analysis artifacts.
  properties:
    question:
      type: string
      description: Original user question.
binding:
  consumes_state_keys: [question, sql, safety, execution, result_profile, chart_suggestion, suggestions]
  produces_state_keys: [answer, final_answer]
policy:
  side_effect: none
  risk_level: safe
metadata:
  next_route: finalize
state_contract:
  merge_strategy: always_new
  emit_artifact: true
