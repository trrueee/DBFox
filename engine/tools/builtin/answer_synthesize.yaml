name: answer.synthesize
group: answer
kind: code
description: >
  Synthesize a final, evidence-grounded answer from all tool results. Use when
  enough information is available to answer the user's question. After this, do
  NOT call more tools — you are done.
handler: answer_synthesize
input_schema:
  type: object
  description: Optional question override.
  properties:
    question:
      type: string
binding:
  produces_state_keys: [answer, final_answer, status]
metadata:
  next_route: answer
