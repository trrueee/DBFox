name: semantic.resolve
group: semantic
kind: llm
description: >
  Resolve business semantics for the current user question. Maps business terms
  (e.g. 'GMV', 'DAU'), metrics, dimensions, filters, and join paths to actual
  database objects using LLM + catalog verification.
handler: semantic_resolve
input_schema:
  type: object
  description: This tool reads all required inputs from current agent state.
binding:
  produces_state_keys: [semantic_resolution]
metadata:
  next_route: answer
