name: result.profile
group: result
kind: code
description: >
  Profile the result set from a successful db.query. Produces column-level
  statistics (kind, nulls, distinct count, min/max/avg for numerics, top values
  for categories), detected result patterns (time_series, category_breakdown,
  top_k, single_metric), notable facts, anomalies, and limitations. Use this
  after db.query when the user asks for analysis, trends, comparisons, rankings,
  anomalies, or any analytical question. Skip for simple row lookups.
handler: result_profile_handler
input_schema:
  type: object
  description: Profile a query result set.
  properties:
    question:
      type: string
      description: Original user question for context.
  required: []
binding:
  consumes_state_keys: [execution]
  produces_state_keys: [result_profile]
policy:
  side_effect: none
  risk_level: safe
metadata:
  next_route: model
state_contract:
  merge_strategy: new
  emit_artifact: true
