name: memory.search
group: answer
kind: code
description: >
  Search long-term memory for relevant context: user preferences, metric
  definitions, schema aliases, join paths, past successful queries, and
  lessons from failures. Use BEFORE planning a query to leverage past knowledge.
handler: memory_search
input_schema:
  type: object
  description: Search long-term memory.
  properties:
    query:
      type: string
      description: What to search for.
    scope:
      type: array
      items:
        type: string
      description: Where to search (user, project, datasource).
    memory_types:
      type: array
      items:
        type: string
      description: Filter by type.
  required: [query]
metadata:
  next_route: answer
