name: escalate.tool_group
group: escalate
kind: code
description: >
  Request additional tool groups when the current plan's tool scope is
  insufficient. Use this when you need a tool from a group that isn't currently
  available. After calling this, the system will expand your tool access and
  let you continue. Only use when truly needed — prefer working within the
  current scope when possible.
handler: escalate_tool_group
input_schema:
  type: object
  description: Request additional tool group access.
  properties:
    group:
      type: string
      description: >
        The tool group you need access to. One of: workspace, environment,
        schema, semantic, query_plan, sql_generation, sql_validation, sql_repair,
        execution, result, chart, answer.
    reason:
      type: string
      description: Why you need this tool group — for audit and debugging.
  required: [group, reason]
output_schema:
  type: object
  description: Escalation result.
  properties:
    escalated:
      type: boolean
    group:
      type: string
    reason:
      type: string
  required: [escalated, group]
binding:
  produces_state_keys: [escalated_tool_groups, allowed_tool_groups]
metadata:
  next_route: progress
policy:
  side_effect: none
  risk_level: safe
