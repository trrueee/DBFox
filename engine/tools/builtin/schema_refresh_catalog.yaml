name: schema.refresh_catalog
group: schema
kind: code
description: >
  Re-introspect the live datasource and sync its schema to the DataBox catalog.
  Use when the catalog appears empty or stale.
handler: schema_refresh_catalog
input_schema:
  type: object
  description: Refresh the schema catalog.
  properties:
    reason:
      type: string
      description: Why the catalog needs refreshing.
metadata:
  next_route: answer
