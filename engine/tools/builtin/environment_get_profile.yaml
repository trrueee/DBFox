name: environment.get_profile
group: environment
kind: code
description: >
  Get the datasource environment profile: env tier (dev/staging/prod), dialect
  (mysql/postgres/sqlite/duckdb), catalog status (fresh/stale/empty), table
  count, and warnings.
handler: environment_get_profile
input_schema:
  type: object
  description: This tool reads all required inputs from current agent state.
binding:
  produces_state_keys: [environment_profile, database_map]
metadata:
  next_route: answer
