name: schema.describe_table
group: schema
kind: code
description: >
  Describe a NAMED table from the live datasource: columns, types, keys, foreign
  keys, and sample rows. Use when the user asks for the schema of a specific
  table (e.g. "show me the singer table", "orders 表有哪些字段").
handler: schema_describe_table
input_schema:
  type: object
  description: Describe a named table from the live datasource.
  properties:
    table_name:
      type: string
      description: The exact table name to describe.
  required: [table_name]
metadata:
  next_route: answer
