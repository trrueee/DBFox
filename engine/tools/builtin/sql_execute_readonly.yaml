name: sql.execute_readonly
group: execution
kind: code
description: >
  Execute a validated read-only SQL query against the datasource. ONLY call
  after sql.validate succeeds and returns can_execute=true. Do NOT call if
  execution is disabled.
handler: sql_execute_readonly
input_schema:
  type: object
  description: Execute validated read-only SQL.
  properties:
    sql:
      type: string
      description: Optional SQL preview. Execution is gated by state.safety.safe_sql.
    question:
      type: string
      description: Optional question override for query history metadata.
binding:
  produces_state_keys: [execution]
policy:
  side_effect: read
  risk_level: warning
  requires_validated_sql: true
metadata:
  next_route: execution_result_route
