name: sql.generate
group: sql_generation
kind: llm
description: >
  Generate a SQL candidate from schema_context and/or query_plan. Use AFTER
  schema context is available. Outputs sql candidate (NOT executed). Does NOT
  validate. Must be followed by sql.validate.
handler: sql_generate
input_schema:
  type: object
  description: This tool reads all required inputs from current agent state.
binding:
  consumes_state_keys: [schema_context, query_plan]
  produces_state_keys: [sql_candidate, sql]
metadata:
  next_route: sql_critic
