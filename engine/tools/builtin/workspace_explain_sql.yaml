name: workspace.explain_sql
group: workspace
kind: code
description: >
  Explain the SQL statement currently in the USER'S EDITOR. Only works when
  there is active SQL in the workspace editor. Do NOT use to explain SQL you
  just generated — use that result directly.
handler: workspace_assist
input_schema:
  type: object
  description: Optional question override.
  properties:
    question:
      type: string
binding:
  produces_state_keys: [answer, final_answer, status]
metadata:
  next_route: answer
