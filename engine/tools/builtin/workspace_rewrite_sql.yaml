name: workspace.rewrite_sql
group: workspace
kind: code
description: >
  Rewrite the user's editor SQL per their instructions. Does NOT execute SQL.
handler: workspace_assist
input_schema:
  type: object
  description: Optional question override.
  properties:
    question:
      type: string
binding:
  produces_state_keys: [answer, final_answer, status]
metadata:
  next_route: answer
