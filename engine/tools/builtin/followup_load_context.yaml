name: followup.load_context
group: answer
kind: code
description: >
  Load and normalize follow-up context from a previous agent run so the current
  question can build on prior SQL, results, and artifacts.
handler: followup_load_context
input_schema:
  type: object
  description: Optional question override.
  properties:
    question:
      type: string
      description: Question to use instead of the current request question.
  additionalProperties: false
output_schema:
  type: object
  description: Normalized follow-up context.
  properties:
    context_summary:
      type: string
    analysis_question:
      type: string
    schema_linking_question:
      type: string
    referenced_artifact_ids:
      type: array
      items:
        type: string
  required: [context_summary, analysis_question, schema_linking_question]
binding:
  produces_state_keys: [followup_context]
metadata:
  next_route: profile_result
