id: semantic_resolution
name: Semantic Resolution
description: >
  Resolve business terms and metrics to actual database objects. Used when the
  user uses business jargon (e.g. "GMV", "DAU", "conversion rate") or when a
  metric definition is ambiguous. This skill maps business concepts to tables,
  columns, and aggregation formulas.

use_when:
  - user uses business terms or jargon
  - metric definition is ambiguous
  - need to understand what a business term maps to in the database
  - user asks "what does X mean in the database"

allowed_tool_groups:
  - environment
  - schema
  - semantic
  - memory
  - answer

forbidden_tool_groups:
  - sql_generation
  - sql_validation
  - sql_repair
  - execution
  - chart

steps:
  - environment.get_profile
  - memory.search
  - semantic.resolve
  - schema.build_context
  - answer.synthesize

success_criteria:
  - business terms are mapped to actual tables/columns
  - metric formulas are defined with referenced columns verified against catalog
  - ambiguous terms are flagged with confidence scores
  - unresolved terms are reported with suggestions

recovery:
  term_not_resolved:
    - condition: "semantic.resolve cannot map a business term"
      action: "ask user to clarify: 'What table/column does [term] refer to?'"
  schema_mismatch:
    - condition: "resolved column not found in catalog"
      action: "flag as hallucination, rebuild with schema.build_context then retry semantic.resolve"
  multiple_candidates:
    - condition: "multiple possible mappings for same term"
      action: "list candidates with evidence and ask user to select"

writeback:
  - memory_type: semantic_definition
    trigger: on_user_confirmed
    content_hint: "business term → table.column mapping with metric formula"
