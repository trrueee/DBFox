id: relationship_discovery
name: Relationship Discovery
description: >
  Discover and explain how tables relate to each other. Used when the user asks
  about joins, table relationships, or how to connect data across tables. This
  skill finds FK relationships, infers join paths, and verifies them against the
  catalog.

use_when:
  - user asks "how are these tables related"
  - user asks about join paths or foreign keys
  - table relationship is unclear
  - need to join tables but don't know the join condition

allowed_tool_groups:
  - environment
  - schema
  - semantic
  - memory

forbidden_tool_groups:
  - sql_generation
  - sql_validation
  - sql_repair
  - execution
  - chart

steps:
  - environment.get_profile
  - memory.search
  - schema.describe_table
  - schema.build_context
  - semantic.resolve

success_criteria:
  - related tables are listed
  - join candidates are explained with FK or inferred columns
  - confidence level and evidence source are shown for each join path
  - ambiguous joins are flagged for user confirmation

recovery:
  no_candidate_tables:
    - condition: "schema.build_context returns zero candidate tables"
      action: "schema.list_tables to expand scope, then retry build_context"
  ambiguous_join:
    - condition: "multiple possible join paths with no clear winner"
      action: "present both options with evidence and ask user to clarify"
  stale_catalog:
    - condition: "foreign keys missing from catalog"
      action: "schema.refresh_catalog then retry schema.describe_table"

writeback:
  - memory_type: join_path
    trigger: on_user_confirmed
    content_hint: "confirmed join path: table_a.col ↔ table_b.col with FK/ inferred evidence"
